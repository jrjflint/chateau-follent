<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 2000">
  <title>Chateau Follent Crest Master – Filled Structure V3</title>
  <desc>
    Chateau Follent crest with square top corners, 50px outer black border,
    40px inner white border, transparent field, and refined diagonal bend.
  </desc>

  <defs>
    <!--
      SHIELD GEOMETRY
      A = outer silhouette
      B = inner edge of black border (50px inset at top/side compositionally)
      C = live field / inner edge of white border (40px further inset)

      Structure:
      - outer = A minus B
      - inner = B minus C
      - bend  = clipped to C
    -->

    <!-- A: outer silhouette -->
    <path id="shield-outer-shape" d="
      M 200 86
      L 1800 86
      L 1800 1016
      C 1800 1298 1645 1558 1398 1696
      L 1010 1910
      C 1007 1912 1003 1914 1000 1914
      C 997 1914 993 1912 990 1910
      L 602 1696
      C 355 1558 200 1298 200 1016
      Z" />

    <!-- B: inner edge of outer black border -->
    <path id="shield-inner-black-edge" d="
      M 250 136
      L 1750 136
      L 1750 1008
      C 1750 1270 1609 1511 1378 1657
      L 1009 1861
      C 1006 1863 1003 1864 1000 1864
      C 997 1864 994 1863 991 1861
      L 622 1657
      C 391 1511 250 1270 250 1008
      Z" />

    <!-- C: live field / inner edge of white border -->
    <path id="shield-field" d="
      M 290 176
      L 1710 176
      L 1710 998
      C 1710 1248 1578 1476 1362 1612
      L 1008 1808
      C 1005 1810 1002 1811 1000 1811
      C 998 1811 995 1810 992 1808
      L 638 1612
      C 422 1476 290 1248 290 998
      Z" />

    <clipPath id="clip-field">
      <use href="#shield-field"/>
    </clipPath>
  </defs>

  <!-- OUTER -->
  <g id="outer" fill="#0A0A0C">
    <path fill-rule="evenodd" d="
      M 200 86
      L 1800 86
      L 1800 1016
      C 1800 1298 1645 1558 1398 1696
      L 1010 1910
      C 1007 1912 1003 1914 1000 1914
      C 997 1914 993 1912 990 1910
      L 602 1696
      C 355 1558 200 1298 200 1016
      Z

      M 250 136
      L 1750 136
      L 1750 1008
      C 1750 1270 1609 1511 1378 1657
      L 1009 1861
      C 1006 1863 1003 1864 1000 1864
      C 997 1864 994 1863 991 1861
      L 622 1657
      C 391 1511 250 1270 250 1008
      Z" />
  </g>

  <!-- INNER -->
  <g id="inner" fill="none">
    <path fill-rule="evenodd" d="
      M 250 136
      L 1750 136
      L 1750 1008
      C 1750 1270 1609 1511 1378 1657
      L 1009 1861
      C 1006 1863 1003 1864 1000 1864
      C 997 1864 994 1863 991 1861
      L 622 1657
      C 391 1511 250 1270 250 1008
      Z

      M 290 176
      L 1710 176
      L 1710 998
      C 1710 1248 1578 1476 1362 1612
      L 1008 1808
      C 1005 1810 1002 1811 1000 1811
      C 998 1811 995 1810 992 1808
      L 638 1612
      C 422 1476 290 1248 290 998
      Z" />
  </g>

  <!-- BEND -->
  <g id="bend" fill="#0A0A0C" clip-path="url(#clip-field)">
    <path d="
      M 290 176
      L 585 176
      L 1668 1259
      C 1622 1372 1548 1477 1440 1567
      C 1422 1582 1407 1593 1394 1601
      L 290 497
      Z" />
  </g>
</svg>